name: Update existing icon pack

on:
  workflow_dispatch:

concurrency:
  group: icon-pack-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Regenerate and reconcile all icons
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      VALKYRIE_VERSION: 1.2.0
      VALKYRIE_SHA256: 58bd9d270706163e1b1c2ac9947e6a200ded302c638ec356ac3c126bf996588c
      SVG2VECTOR_VERSION: 2.9.1
      ICON_PACKAGE_NAME: moe.rukamori.iconpack
      ICON_RANDOM_DIGITS: 6

    steps:
      - name: Require branch and PAT
        env:
          ICON_PACK_PAT: ${{ secrets.ICON_PACK_PAT }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$REF_TYPE" != "branch" ]; then
            echo "::error::Icon updates must run against a branch."
            exit 1
          fi
          if [ -z "$ICON_PACK_PAT" ]; then
            echo "::error::Repository secret ICON_PACK_PAT is required."
            exit 1
          fi

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch submitted SVG history
        run: |
          git fetch --no-tags origin \
            "+refs/pull/*/head:refs/remotes/origin/pull/*"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pinned SVG to VectorDrawable converter
        run: npm install --global "svg2vectordrawable@${SVG2VECTOR_VERSION}"

      - name: Install pinned Valkyrie CLI
        run: |
          curl --fail --location --silent --show-error \
            --output /tmp/valkyrie.zip \
            "https://github.com/ComposeGears/Valkyrie/releases/download/cli-${VALKYRIE_VERSION}/valkyrie-cli-${VALKYRIE_VERSION}.zip"
          echo "${VALKYRIE_SHA256}  /tmp/valkyrie.zip" | sha256sum --check --strict
          unzip -q /tmp/valkyrie.zip -d /tmp/valkyrie
          chmod +x /tmp/valkyrie/bin/valkyrie
          /tmp/valkyrie/bin/valkyrie --version

      - name: Update all generated icons
        run: |
          python3 .github/scripts/process_icon_submission.py \
            --mode update \
            --valkyrie /tmp/valkyrie/bin/valkyrie \
            --s2v "$(command -v s2v)" \
            --package-name "$ICON_PACKAGE_NAME" \
            --random-digits "$ICON_RANDOM_DIGITS"

      - name: Commit updated icon pack
        env:
          ICON_PACK_PAT: ${{ secrets.ICON_PACK_PAT }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          if git diff --quiet && [ -z "$(git status --short)" ]; then
            echo "No icon updates to commit."
            exit 0
          fi

          pat_user_json="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${ICON_PACK_PAT}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user)"
          pat_login="$(printf '%s' "$pat_user_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["login"])')"
          pat_id="$(printf '%s' "$pat_user_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"

          git config user.name "$pat_login"
          git config user.email "${pat_id}+${pat_login}@users.noreply.github.com"
          git add metadata.json pack xml
          git commit -m "build(icon-pack): update generated vectors"
          git remote set-url origin "https://x-access-token:${ICON_PACK_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${TARGET_BRANCH}"
